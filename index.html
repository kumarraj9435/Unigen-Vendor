function IconBase({ children, size = 16, color = "currentColor", strokeWidth = 2, style }) {

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// Screen chhota ho (phone) to alag, zyada touch-friendly layout dikhane ke liye —
// resize hote hi (jaise phone rotate karo) yeh khud update ho jaata hai.
function useIsMobile(breakpoint = 720) {
  const [isMobile, setIsMobile] = useState(() => (typeof window !== "undefined" ? window.innerWidth <= breakpoint : false));
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth <= breakpoint);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [breakpoint]);
  return isMobile;
}

// Jab vendor "Auto Packing" flag on ho, product order save hote hi isi qty ki
// ek matching Packing Order entry bhi khud-b-khud ban jaati hai.
const AUTO_PACKING_NOTE = "Auto: packing qty bhej di gayi (order qty ke barabar)";
function buildAutoPackingEntry(sourceEntry) {
  return {
    ...sourceEntry,
    id: uid(),
    kind: "packing",
    receivedQty: "",
    receivedDate: "",
    receipts: [],
    remark: sourceEntry.remark ? `${sourceEntry.remark} · ${AUTO_PACKING_NOTE}` : AUTO_PACKING_NOTE,
  };
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function fmtDate(d) {
  if (!d) return "-";
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
}

// Order kai baar ek saath poora nahi aata — parts me (multiple receipts) aata hai.
// Agar entry.receipts (receiving log) mojood hai to uska total hi asli received qty hai,
// warna purana single receivedQty field use hota hai (backward compatible).
function getReceivedQty(e) {
  if (Array.isArray(e.receipts) && e.receipts.length) {
    return e.receipts.reduce((sum, r) => sum + (Number(r.qty) || 0), 0);
  }
  return Number(e.receivedQty) || 0;
}

function getLastReceivedDate(e) {
  if (Array.isArray(e.receipts) && e.receipts.length) {
    return e.receipts.reduce((latest, r) => (!latest || (r.date && r.date > latest)) ? r.date : latest, "");
  }
  return e.receivedDate || "";
}

function getStatus(e) {
  const order = Number(e.orderQty) || 0;
  const recv = getReceivedQty(e);
  if (recv <= 0) return "pending";
  if (recv < order) return "partial";
  return "completed";
}

function isOverdue(e) {
  const status = getStatus(e);
  if (status === "completed") return false;
  if (!e.expectedDate) return false;
  return new Date(e.expectedDate) < new Date(todayStr());
}

function isUrgent(e) {
  return !!e.urgent;
}

// Urgent entries hamesha list ke top pe aaye — baaki sab apne purane order (date desc) me.
function sortWithUrgentFirst(list, compareFn) {
  return [...list].sort((a, b) => {
    const ua = isUrgent(a) ? 1 : 0;
    const ub = isUrgent(b) ? 1 : 0;
    if (ua !== ub) return ub - ua;
    return compareFn ? compareFn(a, b) : 0;
  });
}

const STATUS_META = {
  pending: { label: "Pending", color: COLORS.amber, bg: COLORS.amberBg, border: COLORS.amberBorder, icon: Clock },
  partial: { label: "Partial", color: COLORS.blue, bg: COLORS.blueBg, border: COLORS.blueBorder, icon: Truck },
  completed: { label: "Completed", color: COLORS.green, bg: COLORS.greenBg, border: COLORS.greenBorder, icon: CheckCircle2 },
  overdue: { label: "Overdue", color: COLORS.red, bg: COLORS.redBg, border: COLORS.redBorder, icon: AlertTriangle },
};

function makeStats(list) {
  let pendingQty = 0, receivedQty = 0, orderQty = 0, overdueCount = 0, completedCount = 0, openCount = 0;
  list.forEach(e => {
    const order = Number(e.orderQty) || 0;
    const recv = getReceivedQty(e);
    orderQty += order;
    receivedQty += recv;
    pendingQty += Math.max(order - recv, 0);
    const st = getStatus(e);
    if (st === "completed") completedCount++; else openCount++;
    if (isOverdue(e)) overdueCount++;
  });
  return { pendingQty, receivedQty, orderQty, overdueCount, completedCount, openCount, total: list.length };
}

function makeVendorChart(list) {
  const map = {};
  list.forEach(e => {
    const order = Number(e.orderQty) || 0;
    const recv = getReceivedQty(e);
    const pend = Math.max(order - recv, 0);
    if (pend <= 0) return;
    map[e.vendor] = (map[e.vendor] || 0) + pend;
  });
  return Object.entries(map).map(([name, pending]) => ({ name, pending }))
    .sort((a, b) => b.pending - a.pending).slice(0, 8);
}

function makeStatusPie(list) {
  let pending = 0, partial = 0, completed = 0;
  list.forEach(e => {
    const st = getStatus(e);
    if (st === "pending") pending++;
    else if (st === "partial") partial++;
    else completed++;
  });
  return [
    { name: "Pending", value: pending, color: COLORS.amber },
    { name: "Partial", value: partial, color: COLORS.blue },
    { name: "Completed", value: completed, color: COLORS.green },
  ].filter(d => d.value > 0);
}

async function sheetFetch(url, options) {
  const res = await fetch(url, options);
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

async function apiGetEntries(url) {
  const data = await sheetFetch(url, { method: "GET" });
  const list = Array.isArray(data) ? data : data.entries;
  if (!Array.isArray(list)) throw new Error("Bad response");
  return list.map(e => ({ ...e, id: e.id || uid() }));
}

// Naya generic GET jo entries ke saath vendors/products/packing items bhi sheet se le aata hai
// (agar backend Code.gs unhe bhejta ho). Purane backend ke saath bhi chalega (sirf entries milegi).
async function apiGetAll(url) {
  const data = await sheetFetch(url, { method: "GET" });
  if (Array.isArray(data)) {
    return { entries: data.map(e => ({ ...e, id: e.id || uid() })), vendors: null, products: null, packingItems: null, users: null };
  }
  return {
    entries: (data.entries || []).map(e => ({ ...e, id: e.id || uid() })),
    vendors: data.vendors || null,
    products: data.products || null,
    packingItems: data.packingItems || null,
    users: data.users || null,
  };
}

async function storageGet(key, fallback) {
  try {
    const raw = window.localStorage.getItem(key);
    if (raw !== null) return JSON.parse(raw);
    return fallback;
  } catch (e) {
    return fallback;
  }
}
async function storageSet(key, value) {
  try {
    window.localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    // ignore
  }
}

function EntryModal({ open, onClose, onSave, onSaveMulti, vendors, products, packingItems, initial }) {
  const isMobile = useIsMobile();
  const isEditing = !!(initial && initial.id);
  const [form, setForm] = useState(initial);
  const [customProduct, setCustomProduct] = useState(false);
  const [customVendor, setCustomVendor] = useState(false);
  const [multiMode, setMultiMode] = useState(false);
  const [skuRows, setSkuRows] = useState([emptySkuRow(), emptySkuRow()]);

  const kind = form.kind || "product";
  const itemsList = kind === "product" ? products : packingItems;
  const isPackingOut = kind === "packingOut";

  useEffect(() => {
    setForm({ materials: [], ...initial });
    const list = (initial.kind || "product") === "product" ? products : packingItems;
    setCustomProduct(initial.product && !list.some(p => p.name === initial.product));
    setCustomVendor(initial.vendor && !vendors.some(v => v.name === initial.vendor));
    setMultiMode(false);
    setSkuRows([emptySkuRow(), emptySkuRow()]);
  }, [initial, open]);

  if (!open) return null;

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // Naya packing/packing-out entry banate waqt ek hi SKU ke liye kai materials
  // (jaise Dabbi + Tray dono) ek saath select ho sakte hai — edit karte waqt
  // (ya Product Order me) single material hi rehta hai, wo pehle jaisa hi kaam karega.
  const useMultiMaterial = kind !== "product" && !isEditing;
  const filledMaterials = (form.materials || []).filter(Boolean);

  const canSave = useMultiMaterial
    ? !!(form.vendor && filledMaterials.length && form.orderQty)
    : !!(form.vendor && form.product && form.orderQty);

  const submitSingle = () => {
    if (!useMultiMaterial) { onSave(form); return; }
    const rows = filledMaterials.map(m => ({ product: m, orderQty: form.orderQty, sku: form.sku || "" }));
    onSaveMulti(
      {
        vendor: form.vendor, contact: form.contact, orderDate: form.orderDate,
        expectedDate: form.expectedDate, remark: form.remark, kind: kind,
        poNo: form.poNo || "", urgent: !!form.urgent,
      },
      rows
    );
  };

  const selectedVendorObj = vendors.find(v => v.name === form.vendor);
  const autoPackingHint = !!(selectedVendorObj && selectedVendorObj.autoPacking) && kind === "product";

  const setSkuRow = (rowId, patch) => setSkuRows(rows => rows.map(r => (r.rowId === rowId ? { ...r, ...patch } : r)));
  const addSkuRow = () => setSkuRows(rows => [...rows, emptySkuRow()]);
  const removeSkuRow = (rowId) => setSkuRows(rows => (rows.length > 1 ? rows.filter(r => r.rowId !== rowId) : rows));
  const setRowMaterials = (rowId, arr) => setSkuRow(rowId, { materials: arr });
  const rowFilledMaterials = (r) => (r.materials || []).filter(Boolean);
  const isRowValid = (r) => kind === "product" ? !!(r.product && r.orderQty) : !!(rowFilledMaterials(r).length && r.orderQty);
  const validSkuCount = kind === "product"
    ? skuRows.filter(isRowValid).length
    : skuRows.reduce((sum, r) => isRowValid(r) ? sum + rowFilledMaterials(r).length : sum, 0);
  const canSaveMulti = !!(form.vendor && skuRows.some(isRowValid));

  const submitMulti = () => {
    if (!canSaveMulti || !onSaveMulti) return;
    let expandedRows = [];
    if (kind === "product") {
      expandedRows = skuRows.filter(isRowValid).map(r => ({ product: r.product, orderQty: r.orderQty, sku: r.sku || "" }));
    } else {
      skuRows.filter(isRowValid).forEach(r => {
        rowFilledMaterials(r).forEach(m => expandedRows.push({ product: m, orderQty: r.orderQty, sku: r.sku || "" }));
      });
    }
    onSaveMulti(
      {
        vendor: form.vendor, contact: form.contact, orderDate: form.orderDate,
        expectedDate: form.expectedDate, remark: form.remark, kind: kind,

        }}>{kindLabel}</div>

function StatusDonut({ data }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const R = 15.9155; // radius so full circumference = 100 (circle trick)
  let acc = 0;
  const segments = data.map(d => {
    const pct = (d.value / total) * 100;
    const seg = { ...d, pct, offset: acc };
    acc += pct;
    return seg;
  });
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: 180 }}>
      <svg viewBox="0 0 42 42" width="150" height="150">
        <circle cx="21" cy="21" r={R} fill="transparent" stroke={COLORS.panelSoft} strokeWidth="6" />
        {segments.map((seg, i) => (
          <circle
            key={i} cx="21" cy="21" r={R} fill="transparent"
            stroke={seg.color} strokeWidth="6"
            strokeDasharray={`${seg.pct} ${100 - seg.pct}`}
            strokeDashoffset={-seg.offset}
            transform="rotate(-90 21 21)"
            strokeLinecap="round"
          />
        ))}
        <text x="21" y="19" textAnchor="middle" fontSize="6" fontWeight="800" fill={COLORS.text}>{total}</text>
        <text x="21" y="26" textAnchor="middle" fontSize="3.4" fill={COLORS.textMuted}>entries</text>
      </svg>
    </div>
  );
}

    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>

  const [newVendorName, setNewVendorName] = useState("");

  const [newProductName, setNewProductName] = useState("");
  const [newPackingItemName, setNewPackingItemName] = useState("");
  const [newUsername, setNewUsername] = useState("");
  const [newUserPassword, setNewUserPassword] = useState("");

  const [webhookUrl, setWebhookUrl] = useState("");
  const [urlInput, setUrlInput] = useState("");
  const [connStatus, setConnStatus] = useState("idle"); // idle | ok | error
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState("");

  // Login / users
  const [users, setUsers] = useState(SEED_USERS);
  const [currentUser, setCurrentUser] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [loginError, setLoginError] = useState("");
  const [loginChecking, setLoginChecking] = useState(false);

  // Bulk selection (Orders / Packing / Packing Out tabs)
  const [selectedIds, setSelectedIds] = useState([]);
  const [bulkQty, setBulkQty] = useState("");
  const [bulkDate, setBulkDate] = useState(todayStr());
  const [bulkRemark, setBulkRemark] = useState("");

  const firstLoad = useRef(true);

  useEffect(() => {
    (async () => {
      const e = await storageGet("vt_entries", null);
      const v = await storageGet("vt_vendors", null);
      const p = await storageGet("vt_products", null);
      let url = await storageGet("vt_webapp_url", "");
      if (!url) {
        url = DEFAULT_WEBAPP_URL;
        await storageSet("vt_webapp_url", url);
      }
      if (e) {
        setEntries(e);
      } else {
        const seeded = SEED_ENTRIES.map(entry => ({ kind: "product", ...entry, id: uid() }));
        setEntries(seeded);
        await storageSet("vt_entries", seeded);
      }
      if (v) setVendors(v); else await storageSet("vt_vendors", SEED_VENDORS);
      if (p) {
        // purane format me products sirf strings the, ya vendors/packingVendors missing the;
        // unhe pura migrate karo taaki naya mapping feature turant kaam kare
        const migrated = p.map(item => {
          const obj = typeof item === "string" ? { name: item } : item;
          return { note: "", vendors: [], packingVendors: [], ...obj };
        });
        setProducts(migrated);
        await storageSet("vt_products", migrated);
      } else {
        setProducts(SEED_PRODUCT_OBJS);
        await storageSet("vt_products", SEED_PRODUCT_OBJS);
      }
      const pk = await storageGet("vt_packing_items", null);
      if (pk) {
        const migratedPk = pk.map(item => ({ note: "", vendors: [], ...item }));
        setPackingItems(migratedPk);
      } else {
        setPackingItems(SEED_PACKING_ITEMS);
        await storageSet("vt_packing_items", SEED_PACKING_ITEMS);
      }

      const u = await storageGet("vt_users", null);
      if (u && u.length) setUsers(u); else await storageSet("vt_users", SEED_USERS);

      if (url) {
        setWebhookUrl(url);
        setUrlInput(url);
        try {
          const remote = await apiGetAll(url);
          setEntries(remote.entries);
          if (remote.vendors && remote.vendors.length) setVendors(remote.vendors);
          if (remote.products && remote.products.length) setProducts(remote.products);
          if (remote.packingItems && remote.packingItems.length) setPackingItems(remote.packingItems);
          if (remote.users && remote.users.length) { setUsers(remote.users); await storageSet("vt_users", remote.users); }
          setConnStatus("ok");
        } catch (err) {
          setConnStatus("error");
        }
      }

      // Pehle se login session ho to dobara login na maange
      const session = await storageGet("vt_session_user", null);
      if (session) setCurrentUser(session);
      setAuthChecked(true);

      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    storageSet("vt_entries", entries);
  }, [entries, loaded]);

  useEffect(() => {
    if (!loaded) return;
    storageSet("vt_vendors", vendors);
  }, [vendors, loaded]);

  useEffect(() => {
    if (!loaded) return;
    storageSet("vt_products", products);
  }, [products, loaded]);

  useEffect(() => {
    if (!loaded) return;
    storageSet("vt_packing_items", packingItems);
  }, [packingItems, loaded]);

  useEffect(() => {
    if (!loaded) return;
    storageSet("vt_users", users);
  }, [users, loaded]);

  useEffect(() => { setSelectedIds([]); }, [tab]);

  // Live auto-sync: agar Google Sheet se connect hai, to har 10 second me
  // background me sheet se latest entries khud-b-khud fetch hoti rahengi,
  // taaki sheet me kisi ne seedha row add/edit/delete ki ho to yaha bhi dikhe.
  useEffect(() => {
    if (!webhookUrl) return;
    const timer = setInterval(async () => {
      if (modalOpen) return; // form khula ho to beech me refresh na karo
      try {
        const remote = await apiGetAll(webhookUrl);
        setEntries(remote.entries);
        if (remote.vendors && remote.vendors.length) setVendors(remote.vendors);
        if (remote.products && remote.products.length) setProducts(remote.products);
        if (remote.packingItems && remote.packingItems.length) setPackingItems(remote.packingItems);
        if (remote.users && remote.users.length) setUsers(remote.users);
        setConnStatus("ok");
      } catch (err) {
        setConnStatus("error");
      }
    }, 10000);
    return () => clearInterval(timer);
  }, [webhookUrl, modalOpen]);

  const openNew = (kind) => {
    setEditing({ id: null, kind: kind || "product", vendor: "", product: "", orderQty: "", orderDate: todayStr(), expectedDate: "", receivedQty: "", receivedDate: "", remark: "", contact: "", poNo: "", urgent: false, sku: "", receipts: [] });
    setModalOpen(true);
  };
  const openEdit = (e) => { setEditing(e); setModalOpen(true); };

  // Ek order kai baar parts me aata hai (jaise 2000 ka order 3-4 khepon me aaye) —
  // yeh function usi order me ek naya "receipt" (part) jodta hai aur total received qty
  // khud-b-khud recalculate ho jaata hai. Sheet connected ho to turant push bhi hota hai.
  const addReceipt = (id, { date, qty, remark }) => {
    const q = Number(qty) || 0;
    if (q <= 0) return;
    let updatedEntry = null;
    setEntries(list => list.map(e => {
      if (e.id !== id) return e;
      const receipts = Array.isArray(e.receipts) ? [...e.receipts] : (Number(e.receivedQty) > 0
        ? [{ id: uid(), date: e.receivedDate || "", qty: Number(e.receivedQty) || 0, remark: "" }]
        : []);
      receipts.push({ id: uid(), date: date || todayStr(), qty: q, remark: remark || "" });
      const totalRecv = receipts.reduce((s, r) => s + (Number(r.qty) || 0), 0);
      const lastDate = receipts.reduce((latest, r) => (!latest || (r.date && r.date > latest)) ? r.date : latest, "");
      updatedEntry = { ...e, receipts, receivedQty: totalRecv, receivedDate: lastDate };
      return updatedEntry;
    }));
    if (webhookUrl && updatedEntry) {
      apiUpsert(webhookUrl, updatedEntry).catch(() => setConnStatus("error"));
    }
  };

  // Urgent tick — turant on/off (list me top pe jaake highlight ho jaata hai)
  const toggleUrgent = (id) => {
    let updatedEntry = null;
    setEntries(list => list.map(e => {
      if (e.id !== id) return e;
      updatedEntry = { ...e, urgent: !e.urgent };
      return updatedEntry;
    }));
    if (webhookUrl && updatedEntry) {
      apiUpsert(webhookUrl, updatedEntry).catch(() => setConnStatus("error"));
    }
  };

  const saveEntry = (form) => {
    const kind = form.kind || "product";
    if (form.vendor && !vendors.some(v => v.name === form.vendor)) {
      setVendors(v => [...v, { name: form.vendor, contact: form.contact || "" }]);
    }
    if (kind === "packing" || kind === "packingOut") {
      if (form.product && !packingItems.some(p => p.name === form.product)) {
        setPackingItems(p => [...p, { name: form.product, note: "", vendors: [] }]);
      }
    } else if (form.product && !products.some(p => p.name === form.product)) {
      setProducts(p => [...p, { name: form.product, note: "", vendors: [], packingVendors: [] }]);
    }
    const finalEntry = form.id ? form : { ...form, id: uid() };
    if (form.id) {
      setEntries(list => list.map(e => e.id === form.id ? finalEntry : e));
      if (webhookUrl) apiUpsert(webhookUrl, finalEntry).catch(() => setConnStatus("error"));
    } else {
      // Kuch vendors ko order jitni hi packing qty bhi bhejni hoti hai — us vendor ka
      // "Auto Packing" flag on ho to yahi qty ki ek Packing Order entry khud bhi ban jaati hai.
      const vendorObj = vendors.find(v => v.name === form.vendor);
      const extraEntries = [];
      if (vendorObj && vendorObj.autoPacking && kind === "product") {
        const packingEntry = buildAutoPackingEntry(finalEntry);
        extraEntries.push(packingEntry);
        if (packingEntry.product && !packingItems.some(p => p.name === packingEntry.product)) {
          setPackingItems(p => [...p, { name: packingEntry.product, note: "", vendors: [] }]);
        }
      }
      const all = [finalEntry, ...extraEntries];
      setEntries(list => [...list, ...all]);
      if (webhookUrl) {
        if (all.length > 1) apiBulkSync(webhookUrl, all).catch(() => setConnStatus("error"));
        else apiUpsert(webhookUrl, finalEntry).catch(() => setConnStatus("error"));
      }
    }
    setModalOpen(false);
  };

  // Ek hi vendor se ek saath kai product/SKU order karna — ek shared vendor/date/remark
  // ke saath kai row (product + qty) bhejta hai, sabki alag-alag entry ban jaati hai.
  // Agar vendor ka "Auto Packing" flag on hai to har row ke liye matching packing entry
  // bhi khud bhi add ho jaati hai.
  const saveMultiEntries = (shared, rows) => {
    const validRows = rows.filter(r => r.product && r.orderQty);
    if (validRows.length === 0) return;
    if (shared.vendor && !vendors.some(v => v.name === shared.vendor)) {
      setVendors(v => [...v, { name: shared.vendor, contact: shared.contact || "" }]);
    }
    const kind = shared.kind || "product";
    const mainEntries = validRows.map(r => ({
      id: uid(), kind,
      vendor: shared.vendor, contact: shared.contact || "",
      product: r.product, orderQty: r.orderQty, sku: r.sku || "",
      orderDate: shared.orderDate || "", expectedDate: shared.expectedDate || "",
      receivedQty: "", receivedDate: "", remark: shared.remark || "",
      poNo: shared.poNo || "", urgent: !!shared.urgent, receipts: [],
    }));
    const isPacking = kind === "packing" || kind === "packingOut";
    const seenNames = new Set((isPacking ? packingItems : products).map(p => p.name));
    mainEntries.forEach(e => {
      if (e.product && !seenNames.has(e.product)) {
        seenNames.add(e.product);
        if (isPacking) setPackingItems(p => [...p, { name: e.product, note: "", vendors: [] }]);
        else setProducts(p => [...p, { name: e.product, note: "", vendors: [], packingVendors: [] }]);
      }
    });
    const vendorObj = vendors.find(v => v.name === shared.vendor);
    let autoEntries = [];
    if (vendorObj && vendorObj.autoPacking && kind === "product") {
      const seenPackingNames = new Set(packingItems.map(p => p.name));
      autoEntries = mainEntries.map(buildAutoPackingEntry);
      autoEntries.forEach(pe => {
        if (pe.product && !seenPackingNames.has(pe.product)) {
          seenPackingNames.add(pe.product);
          setPackingItems(p => [...p, { name: pe.product, note: "", vendors: [] }]);
        }
      });
    }
    const all = [...mainEntries, ...autoEntries];
    setEntries(list => [...list, ...all]);
    if (webhookUrl) {
      apiBulkSync(webhookUrl, all).catch(() => setConnStatus("error"));
    }
    setModalOpen(false);
  };

  // Vendor ka "Auto Packing" flag on/off — sheet connected ho to turant wahi save ho jaata hai
  const toggleVendorAutoPacking = (name) => {
    const current = vendors.find(v => v.name === name);
    const nextVal = !(current && current.autoPacking);
    setVendors(list => list.map(v => (v.name === name ? { ...v, autoPacking: nextVal } : v)));
    if (webhookUrl) {
      apiSetVendorAutoPacking(webhookUrl, name, nextVal).catch(() => setConnStatus("error"));
    }
  };

  // Entry delete karne se pehle password maangte hai, taaki galti se ya kisi aur se
  // koi entry delete na ho jaye.
  const DELETE_PASSWORD = "Unigen123";

  const deleteEntry = (id) => {
    const pwd = window.prompt("Entry delete karne ke liye password daalo:");
    if (pwd === null) return; // user ne cancel kiya
    if (pwd !== DELETE_PASSWORD) {
      window.alert("Galat password — entry delete nahi hui.");
      return;
    }
    setEntries(list => list.filter(e => e.id !== id));
    if (webhookUrl) {
      apiDelete(webhookUrl, id).catch(() => setConnStatus("error"));
    }
  };

  const updateProductNote = (name, note) => {
    setProducts(list => list.map(p => p.name === name ? { ...p, note } : p));
  };

  const toggleProductVendor = (name, field, vendorName) => {
    setProducts(list => list.map(p => {
      if (p.name !== name) return p;
      const cur = p[field] || [];
      const next = cur.includes(vendorName) ? cur.filter(v => v !== vendorName) : [...cur, vendorName];
      return { ...p, [field]: next };
    }));
  };

  const togglePackingItemVendor = (name, vendorName) => {
    setPackingItems(list => list.map(p => {
      if (p.name !== name) return p;
      const cur = p.vendors || [];
      const next = cur.includes(vendorName) ? cur.filter(v => v !== vendorName) : [...cur, vendorName];
      return { ...p, vendors: next };
    }));
  };

  const updatePackingItemNote = (name, note) => {
    setPackingItems(list => list.map(p => p.name === name ? { ...p, note } : p));
  };

  const deletePackingItem = (name) => {
    setPackingItems(list => list.filter(p => p.name !== name));
  };

  const addProduct = () => {
    const name = newProductName.trim();
    if (!name) return;
    if (!products.some(p => p.name === name)) {
      setProducts(list => [...list, { name, note: "" }]);
    }
    setNewProductName("");
  };

  const deleteProduct = (name) => {
    setProducts(list => list.filter(p => p.name !== name));
  };

  const addPackingItem = () => {
    const name = newPackingItemName.trim();
    if (!name) return;
    if (!packingItems.some(p => p.name === name)) {
      setPackingItems(list => [...list, { name, note: "", vendors: [] }]);
    }
    setNewPackingItemName("");
  };

  const updateRemark = (id, remark) => {
    let updatedEntry = null;
    setEntries(list => list.map(e => {
      if (e.id !== id) return e;
      updatedEntry = { ...e, remark };
      return updatedEntry;
    }));
    if (webhookUrl && updatedEntry) {
      apiUpsert(webhookUrl, updatedEntry).catch(() => setConnStatus("error"));
    }
  };

  // ---- Bulk update (ek saath kai orders select karke update karna) ----
  const toggleSelect = (id) => {
    setSelectedIds(list => list.includes(id) ? list.filter(x => x !== id) : [...list, id]);
  };
  const toggleSelectAll = (ids) => {
    setSelectedIds(list => (ids.every(id => list.includes(id)) ? list.filter(id => !ids.includes(id)) : Array.from(new Set([...list, ...ids]))));
  };
  const clearSelection = () => setSelectedIds([]);

  // Bulk: sabhi selected orders me ek saath same date/qty ka receipt jod do
  // (jaise "aaj 5 vendors se 100-100 pcs aaye" — ek click me sab update)
  const bulkAddReceipt = () => {
    const q = Number(bulkQty) || 0;
    if (q <= 0 || selectedIds.length === 0) return;
    selectedIds.forEach(id => addReceipt(id, { date: bulkDate, qty: q, remark: bulkRemark }));
    setBulkQty(""); setBulkRemark("");
    clearSelection();
  };

  // Bulk: selected orders ka remark ek saath set karna
  const bulkSetRemark = () => {
    if (selectedIds.length === 0) return;
    const updated = [];
    setEntries(list => list.map(e => {
      if (!selectedIds.includes(e.id)) return e;
      const ne = { ...e, remark: bulkRemark };
      updated.push(ne);
      return ne;
    }));
    if (webhookUrl && updated.length) {
      apiBulkUpsert(webhookUrl, updated).catch(() => setConnStatus("error"));
    }
    setBulkRemark("");
    clearSelection();
  };

  // Bulk: selected orders ko poora "completed" mark karna (received = ordered)
  const bulkMarkCompleted = () => {
    if (selectedIds.length === 0) return;
    const updated = [];
    setEntries(list => list.map(e => {
      if (!selectedIds.includes(e.id)) return e;
      const order = Number(e.orderQty) || 0;
      const ne = { ...e, receivedQty: order, receivedDate: e.receivedDate || todayStr(), receipts: [] };
      updated.push(ne);
      return ne;
    }));
    if (webhookUrl && updated.length) {
      apiBulkUpsert(webhookUrl, updated).catch(() => setConnStatus("error"));
    }
    clearSelection();
  };

  // Bulk: selected orders ko urgent mark / unmark karna
  const bulkSetUrgent = (val) => {
    if (selectedIds.length === 0) return;
    const updated = [];
    setEntries(list => list.map(e => {
      if (!selectedIds.includes(e.id)) return e;
      const ne = { ...e, urgent: val };
      updated.push(ne);
      return ne;
    }));
    if (webhookUrl && updated.length) {
      apiBulkUpsert(webhookUrl, updated).catch(() => setConnStatus("error"));
    }
    clearSelection();
  };

  const bulkDeleteSelected = () => {
    if (selectedIds.length === 0) return;
    const pwd = window.prompt(`${selectedIds.length} entries delete karne ke liye password daalo:`);
    if (pwd === null) return;
    if (pwd !== DELETE_PASSWORD) {
      window.alert("Galat password — kuch bhi delete nahi hua.");
      return;
    }
    const ids = [...selectedIds];
    setEntries(list => list.filter(e => !ids.includes(e.id)));
    if (webhookUrl) {
      ids.forEach(id => apiDelete(webhookUrl, id).catch(() => setConnStatus("error")));
    }
    clearSelection();
  };

  // ---- Login / Users ----
  const handleLogin = async (username, password) => {
    setLoginError("");
    setLoginChecking(true);
    // Agar sheet connected hai to pehle latest users refresh kar lo, taaki
    // sheet me abhi-abhi update hui password bhi turant kaam kare
    let currentUsers = users;
    if (webhookUrl) {
      try {
        const remote = await apiGetAll(webhookUrl);
        if (remote.users && remote.users.length) { currentUsers = remote.users; setUsers(remote.users); }
      } catch (err) { /* offline / sheet down — local list se hi check kar lo */ }
    }
    const match = currentUsers.find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);
    setLoginChecking(false);
    if (!match) {
      setLoginError("Username ya password galat hai.");
      return;
    }
    setCurrentUser(match.username);
    await storageSet("vt_session_user", match.username);
  };

  const handleLogout = async () => {
    setCurrentUser(null);
    await storageSet("vt_session_user", null);
  };

  // User Details me naya user add karna ya kisi existing user ka password update karna
  const saveUser = (user) => {
    setUsers(list => {
      const exists = list.some(u => u.username.toLowerCase() === user.username.toLowerCase());
      const next = exists
        ? list.map(u => u.username.toLowerCase() === user.username.toLowerCase() ? { ...u, ...user } : u)
        : [...list, user];
      if (webhookUrl) {
        apiSyncUsers(webhookUrl, next).catch(() => setConnStatus("error"));
      }
      return next;
    });
  };

  const deleteUser = (username) => {
    setUsers(list => {
      const next = list.filter(u => u.username.toLowerCase() !== username.toLowerCase());
      if (webhookUrl) {
        apiSyncUsers(webhookUrl, next).catch(() => setConnStatus("error"));
      }
      return next;
    });
  };

  const connectSheet = async () => {
    const url = urlInput.trim();
    if (!url) return;
    setSyncing(true);
    setSyncMsg("");
    try {
      const remote = await apiGetAll(url);
      setEntries(remote.entries);
      if (remote.vendors && remote.vendors.length) setVendors(remote.vendors);
      if (remote.products && remote.products.length) setProducts(remote.products);
      if (remote.packingItems && remote.packingItems.length) setPackingItems(remote.packingItems);
      if (remote.users && remote.users.length) setUsers(remote.users);
      else await apiSyncUsers(url, users).catch(() => {}); // pehli baar connect ho raha ho to default user sheet me bhej do
      setWebhookUrl(url);
      await storageSet("vt_webapp_url", url);
      setConnStatus("ok");
      setSyncMsg(`Connected. ${remote.entries.length} entries load hui sheet se.`);
    } catch (err) {
      setConnStatus("error");
      setSyncMsg("Connect nahi hua. URL check karo ya deployment access 'Anyone' rakho.");
    }
    setSyncing(false);
  };

  const disconnectSheet = async () => {
    setWebhookUrl("");
    setUrlInput("");
    setConnStatus("idle");
    await storageSet("vt_webapp_url", "");
    setSyncMsg("Disconnected. Ab data sirf yaha local save hoga.");
  };

  const pushAllToSheet = async () => {
    if (!webhookUrl) return;
    setSyncing(true);
    setSyncMsg("");
    try {
      await apiBulkSync(webhookUrl, entries);
      await apiSyncMaster(webhookUrl, { vendors, products, packingItems });
      await apiSyncUsers(webhookUrl, users);
      setConnStatus("ok");
      setSyncMsg(`Sab ${entries.length} entries + vendors/products/packing items/users sheet me push ho gaye.`);
    } catch (err) {
      setConnStatus("error");
      setSyncMsg("Push fail hua, dubara try karo.");
    }
    setSyncing(false);
  };

  const pullFromSheet = async () => {
    if (!webhookUrl) return;
    setSyncing(true);
    setSyncMsg("");
    try {
      const remote = await apiGetAll(webhookUrl);
      setEntries(remote.entries);
      if (remote.vendors && remote.vendors.length) setVendors(remote.vendors);
      if (remote.products && remote.products.length) setProducts(remote.products);
      if (remote.packingItems && remote.packingItems.length) setPackingItems(remote.packingItems);
      if (remote.users && remote.users.length) setUsers(remote.users);
      setConnStatus("ok");
      setSyncMsg(`${remote.entries.length} entries sheet se refresh hui.`);
    } catch (err) {
      setConnStatus("error");
      setSyncMsg("Pull fail hua, dubara try karo.");
    }
    setSyncing(false);
  };

  const productEntries = useMemo(() => entries.filter(e => (e.kind || "product") === "product"), [entries]);
  const packingEntries = useMemo(() => entries.filter(e => e.kind === "packing"), [entries]);
  const packingOutEntries = useMemo(() => entries.filter(e => e.kind === "packingOut"), [entries]);

  const filtered = useMemo(() => {
    const base = tab === "packing" ? packingEntries : tab === "packingOut" ? packingOutEntries : productEntries;
    const result = base.filter(e => {
      if (vendorFilter !== "all" && e.vendor !== vendorFilter) return false;
      if (statusFilter !== "all" && tab !== "packingOut") {
        if (statusFilter === "overdue" && !isOverdue(e)) return false;
        if (statusFilter !== "overdue" && getStatus(e) !== statusFilter) return false;
      }
      if (search) {
        const q = search.toLowerCase();
        const sVendor = e.vendor ? String(e.vendor).toLowerCase() : "";
        const sProduct = e.product ? String(e.product).toLowerCase() : "";
        const sRemark = e.remark ? String(e.remark).toLowerCase() : "";
        const sPoNo = e.poNo ? String(e.poNo).toLowerCase() : "";
        const sSku = e.sku ? String(e.sku).toLowerCase() : "";
        if (!(sVendor.includes(q) || sProduct.includes(q) || sRemark.includes(q) || sPoNo.includes(q) || sSku.includes(q))) return false;
      }
      if (dateFrom && e.orderDate && e.orderDate < dateFrom) return false;
      if (dateTo && e.orderDate && e.orderDate > dateTo) return false;
      return true;
    });
    // Urgent entries hamesha top pe — baaki naye order date se sabse upar
    return sortWithUrgentFirst(result, (a, b) => (b.orderDate || "").localeCompare(a.orderDate || ""));
  }, [tab, productEntries, packingEntries, packingOutEntries, vendorFilter, statusFilter, search, dateFrom, dateTo]);

  const stats = useMemo(() => makeStats(productEntries), [productEntries]);
  const packingStats = useMemo(() => makeStats(packingEntries), [packingEntries]);
  const vendorChartData = useMemo(() => makeVendorChart(productEntries), [productEntries]);
  const packingVendorChartData = useMemo(() => makeVendorChart(packingEntries), [packingEntries]);
  const statusPieData = useMemo(() => makeStatusPie(productEntries), [productEntries]);
  const packingStatusPieData = useMemo(() => makeStatusPie(packingEntries), [packingEntries]);
  const urgentCount = useMemo(() => entries.filter(isUrgent).length, [entries]);

  const wrap = {
    background: COLORS.bg, minHeight: 500, color: COLORS.text,
    fontFamily: "ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif",
    borderRadius: 14, padding: isMobile ? 10 : 20, boxSizing: "border-box",
  };

  if (!loaded || !authChecked) {
    return (
      <div style={{ ...wrap, display: "flex", alignItems: "center", justifyContent: "center", minHeight: 300 }}>
        <div style={{ color: COLORS.textMuted, fontSize: 13 }}>Loading vendor data...</div>
      </div>
    );
  }

  if (!currentUser) {
    return <LoginScreen onLogin={handleLogin} error={loginError} checking={loginChecking} />;
  }

  const TabBtn = ({ id, label, icon: Icon, badge }) => (
    <button onClick={() => setTab(id)} style={{
      display: "flex", alignItems: "center", gap: 7,
      background: tab === id ? COLORS.amberBg : "transparent",
      color: tab === id ? COLORS.amber : COLORS.textDim,
      border: tab === id ? `1px solid ${COLORS.amberBorder}` : "1px solid transparent",
      borderRadius: 9, padding: "8px 14px", fontSize: 13, fontWeight: 700,
      cursor: "pointer", letterSpacing: 0.2, flexShrink: 0, whiteSpace: "nowrap",
    }}>
      <Icon size={15} /> {label}
      {!!badge && (
        <span style={{
          background: COLORS.urgent, color: "#FFFFFF", borderRadius: 20, fontSize: 10.5,
          fontWeight: 800, padding: "1px 6px", marginLeft: 2,
        }}>{badge}</span>
      )}
    </button>
  );

  const newEntryLabel = tab === "packing" ? "New Packing Entry" : tab === "packingOut" ? "New Packing Out Entry" : "New Entry";
  const newEntryKind = tab === "packing" ? "packing" : tab === "packingOut" ? "packingOut" : "product";

  return (
    <div style={wrap}>
      <div style={{
        position: "sticky", top: 0, zIndex: 40, background: COLORS.bg,
        paddingTop: 2, marginTop: -2, paddingBottom: 2,
      }}>
      <div style={{
        display: "flex", justifyContent: "space-between",
        alignItems: isMobile ? "stretch" : "flex-start", flexDirection: isMobile ? "column" : "row", flexWrap: "wrap", gap: 14,
        marginBottom: 18, background: `linear-gradient(135deg, ${COLORS.brandFrom} 0%, ${COLORS.brandTo} 100%)`,
        borderRadius: 16, padding: isMobile ? "14px 16px" : "18px 22px", boxShadow: "0 8px 26px rgba(30,79,216,0.28)",
      }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{
              width: 38, height: 38, borderRadius: 10, background: "rgba(255,255,255,0.92)",
              display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
            }}>
              <img src={LOGO_DATA_URI} alt="Unigen" style={{ height: 24, width: "auto" }} />
            </div>
            <div style={{ fontSize: isMobile ? 17 : 19, fontWeight: 800, letterSpacing: 0.3, color: "#FFFFFF" }}>Vendor Order Tracker</div>
          </div>
          {!isMobile && (
            <div style={{ fontSize: 12.5, color: "rgba(255,255,255,0.78)", marginTop: 4, marginLeft: 48 }}>
              UNIGEN — vendor follow-up, pending vs received, dispatch schedule
            </div>
          )}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <div style={{
            display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 700,
            color: connStatus === "ok" ? "#B8F5CF" : connStatus === "error" ? "#FFC9C6" : "rgba(255,255,255,0.75)",
          }}>
            {connStatus === "ok" ? <Cloud size={14} /> : <CloudOff size={14} />}
            {connStatus === "ok" ? "Sheet connected" : connStatus === "error" ? "Sheet error" : "Local only"}
          </div>
          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.85)", display: "flex", alignItems: "center", gap: 6 }}>
            👤 {currentUser}
            <button onClick={handleLogout} style={{
              ...smallBtnStyle, padding: "5px 10px", fontSize: 11.5,
              background: "rgba(255,255,255,0.14)", color: "#FFFFFF", border: "1px solid rgba(255,255,255,0.3)",
            }}>Logout</button>
          </div>
          <button onClick={() => openNew(newEntryKind)} style={{
            display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
            background: "#FFFFFF", color: COLORS.amber, border: "none", width: isMobile ? "100%" : "auto",
            borderRadius: 9, padding: "11px 16px", fontWeight: 800, fontSize: 13.5, cursor: "pointer",
          }}>
            <Plus size={16} /> {newEntryLabel}
          </button>
        </div>
      </div>

      <div style={{
        display: "flex", gap: 8, marginBottom: 18, borderBottom: `1px solid ${COLORS.borderSoft}`, paddingBottom: 14,
        flexWrap: isMobile ? "nowrap" : "wrap", overflowX: isMobile ? "auto" : "visible", WebkitOverflowScrolling: "touch",
        background: COLORS.bg,
      }}>
        <TabBtn id="dashboard" label="Dashboard" icon={LayoutDashboard} />
        <TabBtn id="orders" label="Orders" icon={ClipboardList} />
        <TabBtn id="packing" label="Packing" icon={PackageCheck} />
        <TabBtn id="packingOut" label="Packing Out" icon={Truck} />
        <TabBtn id="vendors" label="Vendors" icon={Users} />
        <TabBtn id="products" label="Products" icon={Package} />
        <TabBtn id="packingItems" label="Packing Items" icon={Package} />
        <TabBtn id="settings" label="Settings" icon={SettingsIcon} />
      </div>
      </div>

      {tab === "dashboard" && (
        <>
          {urgentCount > 0 && (
            <div style={{
              background: COLORS.urgentBg, border: `1px solid ${COLORS.urgentBorder}`, borderRadius: 12,
              padding: "12px 16px", marginBottom: 16, display: "flex", alignItems: "center", gap: 10,
            }}>
              <AlertTriangle size={16} color={COLORS.urgent} />
              <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.urgent }}>
                {urgentCount} entries URGENT mark ki gayi hai — Orders / Packing / Packing Out tabs me top pe highlight ho rahi hai.
              </div>
            </div>
          )}

function RemarkCell({ entry, onUpdateRemark }) {
  const [val, setVal] = useState(entry.remark || "");
  const [dirty, setDirty] = useState(false);

  useEffect(() => { setVal(entry.remark || ""); setDirty(false); }, [entry.id, entry.remark]);

  const commit = () => {
    if (dirty) onUpdateRemark(entry.id, val);
    setDirty(false);
  };

  return (
    <input
      value={val}
      placeholder="Note / remark likho..."
      onChange={e => { setVal(e.target.value); setDirty(true); }}
      onBlur={commit}
      onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
      style={{
        width: "100%", minWidth: 140, background: "transparent", border: "none",
        borderBottom: `1px dashed ${COLORS.borderSoft}`, color: COLORS.textDim,
        fontSize: 12.5, padding: "3px 2px", outline: "none", fontFamily: "inherit",
      }}
    />
  );
}

function ReceiptLog({ entry, onAddReceipt }) {
  const [qty, setQty] = useState("");
  const [date, setDate] = useState(todayStr());
  const [remark, setRemark] = useState("");
  const receipts = Array.isArray(entry.receipts) ? entry.receipts : [];

  const submit = () => {
    const q = Number(qty) || 0;
    if (q <= 0) return;
    onAddReceipt(entry.id, { date, qty: q, remark });
    setQty(""); setRemark("");
  };

  return (
    <div style={{ padding: "12px 16px", background: COLORS.panelSoft, borderTop: `1px solid ${COLORS.borderSoft}` }}>
      <div style={{ fontSize: 11.5, fontWeight: 700, color: COLORS.textMuted, letterSpacing: 0.4, marginBottom: 8, textTransform: "uppercase" }}>
        Receiving log — order kai parts me aaya to yaha sab dikhega
      </div>
      {receipts.length === 0 ? (
        <div style={{ fontSize: 12.5, color: COLORS.textMuted, marginBottom: 10 }}>Abhi tak koi part receive nahi hui hai.</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 5, marginBottom: 12, maxWidth: 640 }}>
          {receipts.map((r, i) => (
            <div key={r.id || i} style={{ display: "flex", gap: 12, fontSize: 12.5, color: COLORS.textDim }}>
              <span style={{ width: 90, color: COLORS.textMuted }}>{fmtDate(r.date)}</span>
              <span style={{ fontFamily: "ui-monospace, monospace", fontWeight: 700, color: COLORS.green }}>+{r.qty}</span>
              {r.remark && <span style={{ color: COLORS.textMuted }}>{r.remark}</span>}
            </div>
          ))}
        </div>
      )}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end", maxWidth: 640 }}>
        <div style={{ width: 130 }}>
          <div style={{ fontSize: 10.5, color: COLORS.textMuted, marginBottom: 4 }}>Date</div>
          <input type="date" style={{ ...inputStyle, fontSize: 12.5, padding: "7px 9px" }} value={date} onChange={e => setDate(e.target.value)} />
        </div>
        <div style={{ width: 100 }}>
          <div style={{ fontSize: 10.5, color: COLORS.textMuted, marginBottom: 4 }}>Qty received</div>
          <input type="number" style={{ ...inputStyle, fontSize: 12.5, padding: "7px 9px" }} placeholder="0" value={qty} onChange={e => setQty(e.target.value)} />
        </div>
        <div style={{ flex: "1 1 140px" }}>
          <div style={{ fontSize: 10.5, color: COLORS.textMuted, marginBottom: 4 }}>Note (optional)</div>
          <input style={{ ...inputStyle, fontSize: 12.5, padding: "7px 9px" }} placeholder="e.g. 1st part" value={remark} onChange={e => setRemark(e.target.value)} />
        </div>
        <button onClick={submit} disabled={!qty} style={{
          display: "flex", alignItems: "center", gap: 5,
          background: qty ? COLORS.amber : COLORS.borderSoft, color: qty ? "#FFFFFF" : COLORS.textMuted,
          border: "none", borderRadius: 8, padding: "8px 14px", fontWeight: 800, fontSize: 12.5,
          cursor: qty ? "pointer" : "not-allowed", whiteSpace: "nowrap",
        }}>
          <Plus size={13} /> Add part
        </button>
      </div>
    </div>
  );
}

          {selectable && (
            <input type="checkbox" checked={selected} onChange={onToggleSelect} style={{ marginTop: 3, flexShrink: 0 }} />

            {e.sku && <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>SKU: {e.sku}</div>}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>

      </div>

          <div style={{ color: COLORS.textMuted, fontSize: 10.5, marginBottom: 2 }}>RECEIVED</div>

                    </td>
                  </tr>
                )}
              </React.Fragment>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

                <td style={{ padding: "10px 10px", color: COLORS.textDim }}>{e.product}</td>
                <td style={{ padding: "10px 10px", color: COLORS.textMuted, whiteSpace: "nowrap" }}>{e.poNo || "-"}</td>
                <td style={{ padding: "10px 10px", color: COLORS.textMuted, whiteSpace: "nowrap" }}>{e.sku || "-"}</td>
                <td style={{ padding: "10px 10px", textAlign: "right", fontFamily: "ui-monospace, monospace" }}>{e.orderQty || 0}</td>
                <td style={{ padding: "10px 10px", color: COLORS.textMuted, whiteSpace: "nowrap" }}>{fmtDate(e.orderDate)}</td>
                <td style={{ padding: "10px 10px", minWidth: 150 }}>
                  <RemarkCell entry={e} onUpdateRemark={onUpdateRemark} />
                </td>
                <td style={{ padding: "10px 10px", whiteSpace: "nowrap" }}>
                  <button onClick={() => onEdit(e)} style={{ background: "none", border: "none", color: COLORS.textMuted, cursor: "pointer", marginRight: 8 }}>
                    <Pencil size={14} />
                  </button>
                  {!compact && (
                    <button onClick={() => onDelete(e.id)} style={{ background: "none", border: "none", color: COLORS.textMuted, cursor: "pointer" }}>
                      <Trash2 size={14} />
                    </button>
                  )}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
